services:
  - type: web
    name: ballistiballs-adv
    runtime: node
    region: oregon
    plan: free
    buildCommand: "pnpm install --no-frozen-lockfile && PORT=3000 BASE_PATH=/ pnpm --filter @workspace/discord-autosender run build && pnpm --filter @workspace/api-server run build"
    startCommand: "node --enable-source-maps artifacts/api-server/dist/index.mjs"
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ballistiballs-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: CLERK_SECRET_KEY
        sync: false
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: AI_INTEGRATIONS_OPENAI_BASE_URL
        sync: false
      - key: AI_INTEGRATIONS_OPENAI_API_KEY
        sync: false

databases:
  - name: ballistiballs-db
    region: oregon
    plan: free
    databaseName: ballistiballs
    user: ballistiballs
