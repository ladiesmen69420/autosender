openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: discord
    description: Discord autosender operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /discord/validate-token:
    post:
      operationId: validateToken
      tags: [discord]
      summary: Validate a Discord token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidateTokenBody"
      responses:
        "200":
          description: Token validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenValidationResult"

  /discord/send-messages:
    post:
      operationId: sendMessages
      tags: [discord]
      summary: Send messages to Discord channels
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessagesBody"
      responses:
        "200":
          description: Messages sent result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendResult"

  /discord/dms:
    post:
      operationId: fetchDMs
      tags: [discord]
      summary: Fetch recent DM conversations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FetchDMsBody"
      responses:
        "200":
          description: List of DM conversations with latest message
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DMConversation"

  /discord/ai-reply:
    post:
      operationId: generateAIReply
      tags: [discord]
      summary: Generate an AI-powered reply to a Discord DM
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateAIReplyBody"
      responses:
        "200":
          description: Generated reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateAIReplyResult"

  /discord/auto-reply:
    post:
      operationId: runAutoReply
      tags: [discord]
      summary: Run auto-reply on all pending DMs using AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunAutoReplyBody"
      responses:
        "200":
          description: Auto-reply results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunAutoReplyResult"

  /discord/presence/start:
    post:
      operationId: startPresence
      tags: [discord]
      summary: Open a Discord gateway connection so the account appears online
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PresenceStartBody"
      responses:
        "200":
          description: Presence status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PresenceStatus"

  /discord/presence/stop:
    post:
      operationId: stopPresence
      tags: [discord]
      summary: Close the Discord gateway connection (account goes offline)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PresenceStopBody"
      responses:
        "200":
          description: Stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PresenceStatus"

  /discord/presence/status:
    post:
      operationId: getPresenceStatus
      tags: [discord]
      summary: Get current presence connection status for a token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PresenceStopBody"
      responses:
        "200":
          description: Presence status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PresenceStatus"

  /discord/warmup/start:
    post:
      operationId: startWarmup
      tags: [discord]
      summary: Begin a multi-day passive warm-up of read-only activity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WarmupStartBody"
      responses:
        "200":
          description: Warm-up status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WarmupStatus"

  /discord/warmup/stop:
    post:
      operationId: stopWarmup
      tags: [discord]
      summary: Cancel an in-progress warm-up
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PresenceStopBody"
      responses:
        "200":
          description: Warm-up status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WarmupStatus"

  /discord/warmup/status:
    post:
      operationId: getWarmupStatus
      tags: [discord]
      summary: Get current warm-up state for a token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PresenceStopBody"
      responses:
        "200":
          description: Warm-up status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WarmupStatus"

  /discord/sessions:
    get:
      operationId: listSessions
      tags: [discord]
      summary: List all saved sessions
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Session"
    post:
      operationId: createSession
      tags: [discord]
      summary: Save a session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionBody"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"

  /discord/sessions/{id}:
    delete:
      operationId: deleteSession
      tags: [discord]
      summary: Delete a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ValidateTokenBody:
      type: object
      properties:
        token:
          type: string
      required:
        - token

    TokenValidationResult:
      type: object
      properties:
        valid:
          type: boolean
        username:
          type: string
        discriminator:
          type: string
        id:
          type: string
        avatar:
          type: string
          nullable: true
        error:
          type: string
          nullable: true
      required:
        - valid

    SendMessagesBody:
      type: object
      properties:
        token:
          type: string
        channels:
          type: array
          items:
            type: string
        message:
          type: string
      required:
        - token
        - channels
        - message

    SendResult:
      type: object
      properties:
        sent:
          type: integer
        failed:
          type: integer
        results:
          type: array
          items:
            $ref: "#/components/schemas/ChannelSendResult"
      required:
        - sent
        - failed
        - results

    ChannelSendResult:
      type: object
      properties:
        channelId:
          type: string
        success:
          type: boolean
        error:
          type: string
          nullable: true
      required:
        - channelId
        - success

    FetchDMsBody:
      type: object
      properties:
        token:
          type: string
      required:
        - token

    DMConversation:
      type: object
      properties:
        channelId:
          type: string
        userId:
          type: string
        username:
          type: string
        avatar:
          type: string
          nullable: true
        lastMessage:
          type: string
        lastMessageId:
          type: string
        fromMe:
          type: boolean
      required:
        - channelId
        - userId
        - username
        - lastMessage
        - lastMessageId
        - fromMe

    GenerateAIReplyBody:
      type: object
      properties:
        context:
          type: string
          description: The message or conversation context to reply to
        persona:
          type: string
          description: Optional persona/instructions for the AI
        token:
          type: string
          description: Discord token to identify the user
        channelId:
          type: string
          description: Optional channel ID to also send the reply
      required:
        - context

    GenerateAIReplyResult:
      type: object
      properties:
        reply:
          type: string
        sent:
          type: boolean
      required:
        - reply
        - sent

    RunAutoReplyBody:
      type: object
      properties:
        token:
          type: string
        persona:
          type: string
          description: AI persona/instructions for generating replies
        fixedMessage:
          type: string
          description: Optional exact message to send instead of generating an AI reply
        fixedMessageVariants:
          type: array
          items:
            type: string
          description: Optional list of message variants. When non-empty, one is picked at random per send (rotation) instead of using fixedMessage.
        triggerKeywords:
          type: array
          items:
            type: string
          description: If non-empty, only reply to DMs whose last message contains at least one of these (case-insensitive)
        maxRepliesPerUser:
          type: integer
          description: Maximum number of fixed-message replies allowed per recipient/channel (0 = unlimited)
        sentCountsByChannel:
          type: object
          additionalProperties:
            type: integer
          description: Map of channelId → how many fixed replies have already been sent to that channel; channels at or above the per-user cap will be skipped
        maxRepliesPerCycle:
          type: integer
          description: Maximum number of DMs to actually reply to in a single scan run (anti-burst). 0 = unlimited.
      required:
        - token

    RunAutoReplyResult:
      type: object
      properties:
        replied:
          type: integer
        skipped:
          type: integer
        details:
          type: array
          items:
            $ref: "#/components/schemas/AutoReplyDetail"
      required:
        - replied
        - skipped
        - details

    PresenceStartBody:
      type: object
      properties:
        token:
          type: string
        status:
          type: string
          description: Discord presence status (online | idle | dnd | invisible)
      required:
        - token

    PresenceStopBody:
      type: object
      properties:
        token:
          type: string
      required:
        - token

    PresenceStatus:
      type: object
      properties:
        connected:
          type: boolean
        status:
          type: string
          nullable: true
        uptimeMs:
          type: integer
        sessionId:
          type: string
          nullable: true
      required:
        - connected
        - uptimeMs

    WarmupStartBody:
      type: object
      properties:
        token:
          type: string
        days:
          type: number
          description: Length of the warmup window in days (e.g. 3)
      required:
        - token
        - days

    WarmupStatus:
      type: object
      properties:
        active:
          type: boolean
        startedAt:
          type: integer
        endsAt:
          type: integer
        remainingMs:
          type: integer
        ticksDone:
          type: integer
        channelsBrowsed:
          type: integer
        guildsOpened:
          type: integer
        messagesRead:
          type: integer
        lastTickAt:
          type: integer
      required:
        - active
        - remainingMs
        - ticksDone

    AutoReplyDetail:
      type: object
      properties:
        username:
          type: string
        channelId:
          type: string
        reply:
          type: string
        success:
          type: boolean
      required:
        - username
        - channelId
        - reply
        - success

    CreateSessionBody:
      type: object
      properties:
        name:
          type: string
        token:
          type: string
        channels:
          type: array
          items:
            type: string
        message:
          type: string
        delay:
          type: integer
        jitter:
          type: integer
          description: Jitter percentage (0-100) to add random delay
      required:
        - name
        - token
        - channels
        - message
        - delay

    Session:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        token:
          type: string
        channels:
          type: array
          items:
            type: string
        message:
          type: string
        delay:
          type: integer
        jitter:
          type: integer
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - name
        - token
        - channels
        - message
        - delay
        - createdAt

    DeleteResult:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success
