openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: discord
    description: Discord autosender operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /discord/validate-token:
    post:
      operationId: validateToken
      tags: [discord]
      summary: Validate a Discord token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidateTokenBody"
      responses:
        "200":
          description: Token validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenValidationResult"

  /discord/send-messages:
    post:
      operationId: sendMessages
      tags: [discord]
      summary: Send messages to Discord channels
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessagesBody"
      responses:
        "200":
          description: Messages sent result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendResult"

  /discord/dms:
    post:
      operationId: fetchDMs
      tags: [discord]
      summary: Fetch recent DM conversations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FetchDMsBody"
      responses:
        "200":
          description: List of DM conversations with latest message
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DMConversation"

  /discord/ai-reply:
    post:
      operationId: generateAIReply
      tags: [discord]
      summary: Generate an AI-powered reply to a Discord DM
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateAIReplyBody"
      responses:
        "200":
          description: Generated reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateAIReplyResult"

  /discord/auto-reply:
    post:
      operationId: runAutoReply
      tags: [discord]
      summary: Run auto-reply on all pending DMs using AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunAutoReplyBody"
      responses:
        "200":
          description: Auto-reply results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunAutoReplyResult"

  /discord/sessions:
    get:
      operationId: listSessions
      tags: [discord]
      summary: List all saved sessions
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Session"
    post:
      operationId: createSession
      tags: [discord]
      summary: Save a session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionBody"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"

  /discord/sessions/{id}:
    delete:
      operationId: deleteSession
      tags: [discord]
      summary: Delete a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ValidateTokenBody:
      type: object
      properties:
        token:
          type: string
      required:
        - token

    TokenValidationResult:
      type: object
      properties:
        valid:
          type: boolean
        username:
          type: string
        discriminator:
          type: string
        id:
          type: string
        avatar:
          type: string
          nullable: true
        error:
          type: string
          nullable: true
      required:
        - valid

    SendMessagesBody:
      type: object
      properties:
        token:
          type: string
        channels:
          type: array
          items:
            type: string
        message:
          type: string
      required:
        - token
        - channels
        - message

    SendResult:
      type: object
      properties:
        sent:
          type: integer
        failed:
          type: integer
        results:
          type: array
          items:
            $ref: "#/components/schemas/ChannelSendResult"
      required:
        - sent
        - failed
        - results

    ChannelSendResult:
      type: object
      properties:
        channelId:
          type: string
        success:
          type: boolean
        error:
          type: string
          nullable: true
      required:
        - channelId
        - success

    FetchDMsBody:
      type: object
      properties:
        token:
          type: string
      required:
        - token

    DMConversation:
      type: object
      properties:
        channelId:
          type: string
        userId:
          type: string
        username:
          type: string
        avatar:
          type: string
          nullable: true
        lastMessage:
          type: string
        lastMessageId:
          type: string
        fromMe:
          type: boolean
      required:
        - channelId
        - userId
        - username
        - lastMessage
        - lastMessageId
        - fromMe

    GenerateAIReplyBody:
      type: object
      properties:
        context:
          type: string
          description: The message or conversation context to reply to
        persona:
          type: string
          description: Optional persona/instructions for the AI
        token:
          type: string
          description: Discord token to identify the user
        channelId:
          type: string
          description: Optional channel ID to also send the reply
      required:
        - context

    GenerateAIReplyResult:
      type: object
      properties:
        reply:
          type: string
        sent:
          type: boolean
      required:
        - reply
        - sent

    RunAutoReplyBody:
      type: object
      properties:
        token:
          type: string
        persona:
          type: string
          description: AI persona/instructions for generating replies
        fixedMessage:
          type: string
          description: Optional exact message to send instead of generating an AI reply
      required:
        - token

    RunAutoReplyResult:
      type: object
      properties:
        replied:
          type: integer
        skipped:
          type: integer
        details:
          type: array
          items:
            $ref: "#/components/schemas/AutoReplyDetail"
      required:
        - replied
        - skipped
        - details

    AutoReplyDetail:
      type: object
      properties:
        username:
          type: string
        channelId:
          type: string
        reply:
          type: string
        success:
          type: boolean
      required:
        - username
        - channelId
        - reply
        - success

    CreateSessionBody:
      type: object
      properties:
        name:
          type: string
        token:
          type: string
        channels:
          type: array
          items:
            type: string
        message:
          type: string
        delay:
          type: integer
        jitter:
          type: integer
          description: Jitter percentage (0-100) to add random delay
      required:
        - name
        - token
        - channels
        - message
        - delay

    Session:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        token:
          type: string
        channels:
          type: array
          items:
            type: string
        message:
          type: string
        delay:
          type: integer
        jitter:
          type: integer
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - name
        - token
        - channels
        - message
        - delay
        - createdAt

    DeleteResult:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success
